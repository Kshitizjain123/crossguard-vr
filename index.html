<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>CrossGuard – Pedestrian Safety VR</title>
  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; overflow: hidden; background: #000; }

    /* ── DOM overlay HUD ── */
    #hud {
      position: fixed; inset: 0;
      pointer-events: none;
      display: none;
      z-index: 9999;
    }

    /* Top-left label */
    #distraction-label {
      position: absolute;
      top: 22px; left: 22px;
      font-family: 'Courier New', monospace;
      font-size: clamp(13px, 1.8vw, 19px);
      font-weight: bold;
      color: #ff2200;
      text-shadow: 0 0 10px #ff0000, 0 0 22px #ff000066;
      line-height: 1.55;
      opacity: 0;
      transition: opacity 0.3s ease;
    }

    /* Red glow spread (fans rightward from left edge) */
    #left-glow {
      position: absolute;
      left: 10px; top: 0; bottom: 0;
      width: 110px;
      background: linear-gradient(to right, #ff220044, transparent);
      opacity: 0;
      transition: opacity 0.25s ease;
    }
    /* LEFT EDGE — solid red bar (car comes from left) */
    #left-bar {
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 10px;
      background: #ff2200;
      box-shadow: 4px 0 28px 6px #ff2200, 22px 0 55px #ff220055;
      opacity: 0;
      transition: opacity 0.25s ease;
    }
    /* Corner brackets — top-left and bottom-left */
    #br-tl {
      position: absolute; top: 18px; left: 18px;
      width: 30px; height: 30px;
      border-top: 3px solid #ff2200;
      border-left: 3px solid #ff2200;
      filter: drop-shadow(0 0 6px #ff2200);
      opacity: 0;
      transition: opacity 0.25s ease;
    }
    #br-bl {
      position: absolute; bottom: 18px; left: 18px;
      width: 30px; height: 30px;
      border-bottom: 3px solid #ff2200;
      border-left: 3px solid #ff2200;
      filter: drop-shadow(0 0 6px #ff2200);
      opacity: 0;
      transition: opacity 0.25s ease;
    }
    /* Danger vignette (close approach) */
    #danger-vignette {
      position: absolute; inset: 0;
      background: radial-gradient(ellipse 80% 70% at 50% 50%,
        transparent 35%, #ff000055 100%);
      opacity: 0;
      transition: opacity 0.12s ease;
    }

    /* Pulse keyframe */
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
    .pulse { animation: pulse 0.7s ease-in-out infinite; }
  </style>
</head>
<body>

<div id="hud">
  <div id="left-bar"></div>
  <div id="left-glow"></div>
  <div id="br-tl"></div>
  <div id="br-bl"></div>
  <div id="danger-vignette"></div>
</div>

<!-- ═══════════════════════════════════════════════════════════════
     SCENE
     Layout: road runs along X axis (left ↔ right).
     Player stands on near pavement at (0,0,0) facing −Z.
     Road occupies z = −3.5 → −10.5.
     Car travels from x=−120 to x=+18 at z=−7 (centre of road).
     Car is rotated 90° Y so it faces its direction of travel (+X).
     Cue triggers at 100 m (Euclidean distance from player to car).
═══════════════════════════════════════════════════════════════ -->
<a-scene
  id="scene"
  webxr="requiredFeatures: local-floor; optionalFeatures: dom-overlay; overlayElement: #hud"
  renderer="antialias: true; colorManagement: true; physicallyCorrectLights: true"
  shadow="type: pcfsoft; enabled: true"
  fog="type: linear; color: #9ab8d0; near: 80; far: 165">

  <a-assets timeout="8000">
    <canvas id="phone-canvas" width="360" height="720"></canvas>
  </a-assets>

  <!-- ── LIGHTS ── -->
  <a-light type="ambient"     color="#c5daf0" intensity="0.5"></a-light>
  <a-light type="directional" color="#fff4dc" intensity="1.05"
    position="-3 12 5" cast-shadow="true"
    shadow-camera-left="-30" shadow-camera-right="30"
    shadow-camera-top="20"   shadow-camera-bottom="-20"
    shadow-map-width="2048"  shadow-map-height="2048"></a-light>
  <a-light type="directional" color="#a8c8e8" intensity="0.28" position="4 5 -3"></a-light>

  <!-- ── SKY ── -->
  <a-sky color="#6899be"></a-sky>

  <!-- ════════════ ROAD (along X, centred at z=−7) ════════════ -->
  <a-box position="0 -0.01 -7" width="260" height="0.02" depth="7"
    color="#1c1c1c" receive-shadow="true"></a-box>


  <!-- Road edge lines -->
  <a-box position="0 0.008 -3.55"  width="260" height="0.01" depth="0.07"
    color="#ccc" material="opacity:.6;transparent:true"></a-box>
  <a-box position="0 0.008 -10.45" width="260" height="0.01" depth="0.07"
    color="#ccc" material="opacity:.6;transparent:true"></a-box>

  <!-- ════════════ ZEBRA CROSSING ════════════
       Stripes run along Z (crossing direction), spaced along X.
       Each stripe: 0.9 wide (X), 7 deep (Z, covering z=−3.5 to −10.5) -->
  <a-entity position="0 0.014 -7">
    <a-box position="-4.5 0 0" width="0.88" height="0.01" depth="7" color="#f2f2f2"></a-box>
    <a-box position="-3.0 0 0" width="0.88" height="0.01" depth="7" color="#f2f2f2"></a-box>
    <a-box position="-1.5 0 0" width="0.88" height="0.01" depth="7" color="#f2f2f2"></a-box>
    <a-box position=" 0.0 0 0" width="0.88" height="0.01" depth="7" color="#f2f2f2"></a-box>
    <a-box position=" 1.5 0 0" width="0.88" height="0.01" depth="7" color="#f2f2f2"></a-box>
    <a-box position=" 3.0 0 0" width="0.88" height="0.01" depth="7" color="#f2f2f2"></a-box>
    <a-box position=" 4.5 0 0" width="0.88" height="0.01" depth="7" color="#f2f2f2"></a-box>
  </a-entity>

  <!-- ════════════ PAVEMENTS ════════════ -->
  <!-- Near (player side): z = 0 → −3.5 -->
  <a-box position="0 0.09 -1.75" width="260" height="0.18" depth="3.5"
    color="#a8a090" receive-shadow="true"></a-box>
  <!-- Kerb near edge -->
  <a-box position="0 0.13 -3.45" width="260" height="0.10" depth="0.18" color="#888070"></a-box>

  <!-- Far side: z = −10.5 → −15 -->
  <a-box position="0 0.09 -12.75" width="260" height="0.18" depth="4.5"
    color="#a8a090" receive-shadow="true"></a-box>
  <!-- Kerb far edge -->
  <a-box position="0 0.13 -10.55" width="260" height="0.10" depth="0.18" color="#888070"></a-box>

  <!-- Pavement behind player -->
  <a-box position="0 0.09 3" width="260" height="0.18" depth="8" color="#a8a090"></a-box>

  <!-- ════════════ BUILDINGS ════════════ -->
  <!-- Far side (across road, z ≈ −15…−25) -->
  <a-box position="-50 8  -19" width="16" height="16" depth="12" color="#7a8898" cast-shadow="true"></a-box>
  <a-box position="-28 12 -21" width="12" height="24" depth="10" color="#6a7888" cast-shadow="true"></a-box>
  <a-box position="-10 7  -18" width="10" height="14" depth="10" color="#8a9080" cast-shadow="true"></a-box>
  <a-box position="  6 9  -20" width="12" height="18" depth="10" color="#7a8870" cast-shadow="true"></a-box>
  <a-box position=" 24 6  -17" width="12" height="12" depth="10" color="#8a9888" cast-shadow="true"></a-box>
  <a-box position=" 44 10 -20" width="14" height="20" depth="10" color="#70788a" cast-shadow="true"></a-box>
  <!-- Window glows on far buildings -->
  <a-entity position="-28 12 -16.1">
    <a-box position=" 2  5 0" width="0.06" height="1.0" depth="1.2" color="#ffd090" material="emissive:#ffd090;emissiveIntensity:.5"></a-box>
    <a-box position="-2  5 0" width="0.06" height="1.0" depth="1.2" color="#90c8ff" material="emissive:#90c8ff;emissiveIntensity:.35"></a-box>
    <a-box position=" 2  1 0" width="0.06" height="1.0" depth="1.2" color="#ffd090" material="emissive:#ffd090;emissiveIntensity:.4"></a-box>
    <a-box position="-2  1 0" width="0.06" height="1.0" depth="1.2" color="#333" material="emissiveIntensity:0"></a-box>
    <a-box position=" 2 -3 0" width="0.06" height="1.0" depth="1.2" color="#ffd090" material="emissive:#ffd090;emissiveIntensity:.3"></a-box>
  </a-entity>

  <!-- Near side (behind player, z ≈ +6…+14) -->
  <a-box position="-30 7  10" width="18" height="14" depth="12" color="#a09080" cast-shadow="true"></a-box>
  <a-box position=" 22 5  10" width="16" height="10" depth="12" color="#909888" cast-shadow="true"></a-box>

  <!-- ════════════ LAMP POSTS ════════════ -->
  <!-- Near pavement, flanking the crossing -->
  <a-entity position="-5.5 0 -1.6">
    <a-cylinder position="0 2.9 0" radius="0.055" height="5.8" color="#505050" cast-shadow="true"></a-cylinder>
    <a-box position="0.7 5.85 0" width="1.5" height="0.06" depth="0.06" color="#484848"></a-box>
    <a-box position="1.42 5.85 0" width="0.32" height="0.24" depth="0.28" color="#c8a430"
      material="emissive:#c8a430;emissiveIntensity:1.0"></a-box>
    <a-light type="point" position="1.42 5.6 0" color="#ffe890" intensity="1.7" distance="15"></a-light>
  </a-entity>
  <a-entity position=" 5.5 0 -1.6">
    <a-cylinder position="0 2.9 0" radius="0.055" height="5.8" color="#505050" cast-shadow="true"></a-cylinder>
    <a-box position="-0.7 5.85 0" width="1.5" height="0.06" depth="0.06" color="#484848"></a-box>
    <a-box position="-1.42 5.85 0" width="0.32" height="0.24" depth="0.28" color="#c8a430"
      material="emissive:#c8a430;emissiveIntensity:1.0"></a-box>
    <a-light type="point" position="-1.42 5.6 0" color="#ffe890" intensity="1.7" distance="15"></a-light>
  </a-entity>
  <!-- Far pavement posts -->
  <a-entity position="-5.5 0 -12.4">
    <a-cylinder position="0 2.9 0" radius="0.055" height="5.8" color="#505050"></a-cylinder>
    <a-box position="0.7 5.85 0" width="1.5" height="0.06" depth="0.06" color="#484848"></a-box>
    <a-box position="1.42 5.85 0" width="0.32" height="0.24" depth="0.28" color="#c8a430"
      material="emissive:#c8a430;emissiveIntensity:.7"></a-box>
  </a-entity>
  <a-entity position=" 5.5 0 -12.4">
    <a-cylinder position="0 2.9 0" radius="0.055" height="5.8" color="#505050"></a-cylinder>
    <a-box position="-0.7 5.85 0" width="1.5" height="0.06" depth="0.06" color="#484848"></a-box>
    <a-box position="-1.42 5.85 0" width="0.32" height="0.24" depth="0.28" color="#c8a430"
      material="emissive:#c8a430;emissiveIntensity:.7"></a-box>
  </a-entity>

  <!-- ════════════ TRAFFIC LIGHT ════════════ -->
  <!-- Left of player at crossing edge -->
  <a-entity position="-5.8 0 -3.2">
    <a-cylinder position="0 3.2 0" radius="0.065" height="6.4" color="#383838"></a-cylinder>
    <a-box position="0 6.7 0" width="0.40" height="1.35" depth="0.34" color="#111"></a-box>
    <a-sphere id="tl-red"   position="0 7.28 0.18" radius="0.12"
      color="#ff1500" material="emissive:#ff1500;emissiveIntensity:1.4"></a-sphere>
    <a-sphere id="tl-amber" position="0 6.78 0.18" radius="0.12"
      color="#1a0900" material="emissiveIntensity:0"></a-sphere>
    <a-sphere id="tl-green" position="0 6.28 0.18" radius="0.12"
      color="#001a06" material="emissiveIntensity:0"></a-sphere>
    <a-light id="tl-red-glow" type="point" position="0 7.28 0.3"
      color="#ff3300" intensity="0.9" distance="5"></a-light>
  </a-entity>

  <!-- ════════════ CAR ════════════
       Starts at x=−120, travels to x=+18 along z=−7.
       rotation="0 −90 0" → car's local −Z aligns with world +X (faces right, direction of travel).
  ════════════ -->
  <a-entity id="car" position="-120 0 -7" rotation="0 -90 0">

    <!-- Body -->
    <a-box position="0 0.42 0" width="2.02" height="0.72" depth="4.45"
      color="#c03020" cast-shadow="true" material="roughness:0.38;metalness:0.45"></a-box>

    <!-- Bonnet (local −Z = front = world +X direction) -->
    <a-box position="0 0.78 -1.58" width="1.97" height="0.22" depth="1.35"
      color="#b52c1c" rotation="12 0 0" material="roughness:0.38;metalness:0.45"></a-box>

    <!-- Cabin -->
    <a-box position="0 1.12 0.28" width="1.88" height="0.70" depth="2.22"
      color="#a82818" cast-shadow="true" material="roughness:0.5;metalness:0.35"></a-box>

    <!-- Front windscreen (local −Z side) -->
    <a-box position="0 1.06 -0.93" width="1.74" height="0.60" depth="0.06"
      color="#99ddff" material="opacity:0.42;transparent:true;roughness:0.04;emissive:#99ddff;emissiveIntensity:0.06"></a-box>

    <!-- Rear screen -->
    <a-box position="0 1.07 1.46" width="1.74" height="0.52" depth="0.06"
      color="#88ccee" material="opacity:0.36;transparent:true"></a-box>

    <!-- Side windows -->
    <a-box position="-0.95 1.10 0.30" width="0.05" height="0.52" depth="1.92"
      color="#99ddff" material="opacity:0.38;transparent:true"></a-box>
    <a-box position=" 0.95 1.10 0.30" width="0.05" height="0.52" depth="1.92"
      color="#99ddff" material="opacity:0.38;transparent:true"></a-box>

    <!-- Door seam lines -->
    <a-box position="-0.96 0.62 0.22" width="0.04" height="0.54" depth="3.85"
      color="#901e10" material="roughness:0.85"></a-box>
    <a-box position=" 0.96 0.62 0.22" width="0.04" height="0.54" depth="3.85"
      color="#901e10" material="roughness:0.85"></a-box>

    <!-- Wheels (cylinder axis = X, rotation 0 0 90) -->
    <a-cylinder position="-1.03 0.33 -1.36" radius="0.33" height="0.22" rotation="0 0 90" color="#111" cast-shadow="true"></a-cylinder>
    <a-cylinder position=" 1.03 0.33 -1.36" radius="0.33" height="0.22" rotation="0 0 90" color="#111" cast-shadow="true"></a-cylinder>
    <a-cylinder position="-1.03 0.33  1.36" radius="0.33" height="0.22" rotation="0 0 90" color="#111" cast-shadow="true"></a-cylinder>
    <a-cylinder position=" 1.03 0.33  1.36" radius="0.33" height="0.22" rotation="0 0 90" color="#111" cast-shadow="true"></a-cylinder>
    <!-- Wheel caps -->
    <a-cylinder position="-1.13 0.33 -1.36" radius="0.20" height="0.02" rotation="0 0 90" color="#555" material="metalness:0.85"></a-cylinder>
    <a-cylinder position=" 1.13 0.33 -1.36" radius="0.20" height="0.02" rotation="0 0 90" color="#555" material="metalness:0.85"></a-cylinder>
    <a-cylinder position="-1.13 0.33  1.36" radius="0.20" height="0.02" rotation="0 0 90" color="#555" material="metalness:0.85"></a-cylinder>
    <a-cylinder position=" 1.13 0.33  1.36" radius="0.20" height="0.02" rotation="0 0 90" color="#555" material="metalness:0.85"></a-cylinder>

    <!-- Front bumper -->
    <a-box position="0 0.24 -2.24" width="1.92" height="0.20" depth="0.14"
      color="#222" material="roughness:0.75"></a-box>

    <!-- Grille -->
    <a-box position="0 0.44 -2.24" width="1.58" height="0.30" depth="0.06" color="#0a0a0a"></a-box>
    <a-box position="0 0.37 -2.23" width="1.52" height="0.03" depth="0.03" color="#777" material="metalness:.9"></a-box>
    <a-box position="0 0.44 -2.23" width="1.52" height="0.03" depth="0.03" color="#777" material="metalness:.9"></a-box>
    <a-box position="0 0.51 -2.23" width="1.52" height="0.03" depth="0.03" color="#777" material="metalness:.9"></a-box>

    <!-- HEADLIGHTS (front = local −Z side) — bright emissive -->
    <a-sphere position="-0.62 0.50 -2.26" radius="0.13"
      color="#fffde0" material="emissive:#fffde0;emissiveIntensity:4"></a-sphere>
    <a-sphere position=" 0.62 0.50 -2.26" radius="0.13"
      color="#fffde0" material="emissive:#fffde0;emissiveIntensity:4"></a-sphere>

    <!-- Headlight cones — rotation "−3 0 0" points toward local −Z = world +X after car rotation -->
    <a-light type="spot" position="-0.62 0.50 -2.10"
      rotation="-3 0 0" angle="23" penumbra="0.3"
      intensity="6" distance="50" color="#fff8e0"></a-light>
    <a-light type="spot" position=" 0.62 0.50 -2.10"
      rotation="-3 0 0" angle="23" penumbra="0.3"
      intensity="6" distance="50" color="#fff8e0"></a-light>

    <!-- Tail lights (rear = local +Z side) -->
    <a-sphere position="-0.62 0.50 2.26" radius="0.11"
      color="#ff2200" material="emissive:#ff2200;emissiveIntensity:1.3"></a-sphere>
    <a-sphere position=" 0.62 0.50 2.26" radius="0.11"
      color="#ff2200" material="emissive:#ff2200;emissiveIntensity:1.3"></a-sphere>

    <!-- Number plate front -->
    <a-box position="0 0.28 -2.26" width="0.55" height="0.14" depth="0.04" color="#ffffee"></a-box>
  </a-entity>

  <!-- ════════════ PLAYER CAMERA ════════════ -->
  <a-entity id="rig" position="0 0 0">
    <a-camera id="cam"
      position="0 1.65 0"
      look-controls="pointerLockEnabled: false"
      wasd-controls="enabled: false"
      near="0.04" far="220">

      <!-- ── PHONE IN HAND ── -->
      <a-entity id="phone-pivot"
        position="0.255 -0.30 -0.44"
        rotation="-10 -22 8">

        <!-- Palm -->
        <a-box position="0 -0.105 0.005"
          width="0.118" height="0.090" depth="0.033"
          color="#ce9060" material="roughness:.92;metalness:0"></a-box>
        <!-- Fingers -->
        <a-box position="-0.037 -0.068 0.009" width="0.022" height="0.054" depth="0.024" rotation="0 0 6"  color="#be7c50" material="roughness:.9"></a-box>
        <a-box position="-0.013 -0.063 0.009" width="0.022" height="0.060" depth="0.024" rotation="0 0 2"  color="#c68056" material="roughness:.9"></a-box>
        <a-box position=" 0.013 -0.063 0.009" width="0.022" height="0.058" depth="0.024" rotation="0 0 -2" color="#be7c50" material="roughness:.9"></a-box>
        <a-box position=" 0.037 -0.070 0.009" width="0.020" height="0.047" depth="0.022" rotation="0 0 -6" color="#bc7a50" material="roughness:.9"></a-box>
        <!-- Thumb -->
        <a-box position="-0.063 -0.032 0.010" width="0.017" height="0.042" depth="0.020" rotation="0 0 36" color="#be7c50" material="roughness:.9"></a-box>
        <!-- Knuckle crease -->
        <a-box position="0 -0.076 0.012" width="0.110" height="0.004" depth="0.006" color="#9e6040"></a-box>

        <!-- Phone chassis – aluminium body -->
        <a-box id="phone-body" position="0 0.010 0"
          width="0.098" height="0.200" depth="0.0095"
          color="#1a1a1e" material="roughness:0.17;metalness:0.90"></a-box>
        <!-- Shiny edge frame -->
        <a-box position="0 0.010 0.0026"
          width="0.096" height="0.197" depth="0.0068"
          color="#888898" material="roughness:0.10;metalness:1.0"></a-box>
        <!-- Rear camera island -->
        <a-box position="0.030 0.078 -0.006"
          width="0.032" height="0.032" depth="0.004"
          color="#111118" material="roughness:0.08;metalness:0.95"></a-box>
        <a-cylinder position="0.024 0.083 -0.008" radius="0.0065" height="0.003" rotation="90 0 0" color="#080808" material="roughness:0.05"></a-cylinder>
        <a-cylinder position="0.036 0.073 -0.008" radius="0.0050" height="0.003" rotation="90 0 0" color="#080808" material="roughness:0.05"></a-cylinder>
        <a-sphere position="0.025 0.072 -0.007" radius="0.0022" color="#ffeecc" material="emissive:#ffeecc;emissiveIntensity:0.3"></a-sphere>

        <!-- Screen bezel -->
        <a-box position="0 0.010 0.0053"
          width="0.092" height="0.193" depth="0.001" color="#000"></a-box>

        <!-- SCREEN (canvas texture) -->
        <a-plane id="phone-screen"
          position="0 0.010 0.0063"
          width="0.086" height="0.183"
          material="src:#phone-canvas; roughness:0.02; emissive:#1133bb; emissiveIntensity:0.35">
        </a-plane>

        <!-- Dynamic island pill -->
        <a-box position="0 0.096 0.0066"
          width="0.021" height="0.007" depth="0.001" color="#000"></a-box>
        <!-- Home indicator -->
        <a-box position="0 -0.083 0.0066"
          width="0.029" height="0.003" depth="0.001"
          color="#666" material="opacity:.65;transparent:true"></a-box>

        <!-- Screen glow -->
        <a-light id="screen-glow" type="point"
          position="0 0.010 0.08"
          color="#3355cc" intensity="0.45" distance="0.60"></a-light>
      </a-entity><!-- /phone-pivot -->


    </a-camera>
  </a-entity>

</a-scene>

<script>
'use strict';

// ─── Offscreen canvas for blur compositing ────────────────────────────────────
const PW = 360, PH = 720;
const mainCanvas = document.getElementById('phone-canvas');
const cx = mainCanvas.getContext('2d');

const offCanvas = document.createElement('canvas');
offCanvas.width = PW; offCanvas.height = PH;
const oc = offCanvas.getContext('2d');

// Draw full phone UI into target context
function drawPhoneUI(g) {
  g.clearRect(0, 0, PW, PH);

  // BG
  g.fillStyle = '#0e1117'; g.fillRect(0, 0, PW, PH);

  // ── Status bar ──
  g.fillStyle = '#111620'; g.fillRect(0, 0, PW, 32);
  g.fillStyle = '#bcc8d8';
  g.font = '14px -apple-system, system-ui, sans-serif';
  g.fillText('9:41', 16, 22);
  // Battery

  g.fillStyle = '#161c28';

  // Avatar

  g.fillStyle = '#fff'; g.font = 'bold 14px sans-serif'; g.fillText('A', 29, 198);
  // Name + time
  g.fillStyle = '#e8eaf2'; g.font = 'bold 14px -apple-system, sans-serif'; g.fillText('Alex Chen', 60, 190);
  g.fillStyle = '#5a6480'; g.font = '11px sans-serif'; g.fillText('2 min ago  ·  📍 Downtown', 60, 207);

  g.fillStyle = 'rgba(255,255,255,0.08)';
  g.fillRect(14, 224, 98, 74); g.fillRect(122, 228, 76, 66); g.fillRect(208, 222, 130, 76);
  // Caption + likes
  g.fillStyle = '#c0c8dc'; g.font = '12px sans-serif'; g.fillText('Loving this city view! 🌆', 14, 322);
  g.fillStyle = '#5a6480'; g.font = '12px sans-serif'; g.fillText('❤️  142    💬  18    ↗ Share', 14, 316);

  // ── Post 2 ──
  g.fillStyle = '#161c28';
  rr(g, 8, 342, PW - 16, 144, 10); g.fill();
  g.fillStyle = '#27ae60';
  g.beginPath(); g.arc(34, 366, 18, 0, Math.PI * 2); g.fill();
  g.fillStyle = '#fff'; g.font = 'bold 14px sans-serif'; g.fillText('S', 29, 372);
  g.fillStyle = '#e8eaf2'; g.font = 'bold 14px -apple-system, sans-serif'; g.fillText('Sarah K.', 60, 364);
  g.fillStyle = '#5a6480'; g.font = '11px sans-serif'; g.fillText('Just now  ·  🔥 Trending', 60, 381);
  g.fillStyle = '#b0b8cc'; g.font = '13px sans-serif';
  g.fillText("Can't believe this sunset!! 😍🌅", 14, 410);
  g.fillStyle = '#8898aa'; g.font = '12px sans-serif';
  g.fillText('The colours are absolutely stunning ✨', 14, 428);

  g.fillStyle = '#161c28';
  rr(g, 8, 500, PW - 16, 108, 10); g.fill();
  g.fillStyle = '#8e44ad';
  g.beginPath(); g.arc(34, 524, 18, 0, Math.PI * 2); g.fill();
  g.fillStyle = '#fff'; g.font = 'bold 14px sans-serif'; g.fillText('U', 29, 530);
  g.fillStyle = '#e8eaf2'; g.font = 'bold 14px -apple-system, sans-serif'; g.fillText('UrbanPics', 60, 522);

  ['#1c3a6e', '#2d6a4f', '#7d3c98'].forEach((c, i) => {

  });

  // ── Nav bar ──
  g.fillStyle = '#0e1117'; g.fillRect(0, 620, PW, PH - 620);

    g.fillStyle = i === 0 ? '#4a9eff' : '#55616e';

    g.fillText(item, 36 + i * 72 - 11, 662);

}

// Composite offscreen → main canvas with multi-sample radial blur
function drawPhone(dim) {
  // 1. Draw fresh UI to offscreen
  drawPhoneUI(oc);

  // 2. Composite onto main canvas
  cx.clearRect(0, 0, PW, PH);

  if (dim < 0.02) {
    // No blur — draw directly
    cx.drawImage(offCanvas, 0, 0);
  } else {
    // Multi-sample radial blur: draw image at 16 angular offsets + centre.
    // Each sample is drawn at reduced alpha so they average to full brightness.
    // This is guaranteed visible unlike ctx.filter which WebGL textures ignore.
    const blurR = dim * 14;   // max spread radius in canvas pixels
    const N = 16;
    cx.globalAlpha = 1 / (N + 1);
    cx.drawImage(offCanvas, 0, 0);                      // centre sample
    for (let i = 0; i < N; i++) {
      const angle = (i / N) * Math.PI * 2;
      cx.drawImage(offCanvas,
        Math.cos(angle) * blurR,
        Math.sin(angle) * blurR);
    }
    cx.globalAlpha = 1;
    // Slight darkening overlay so it reads as "screen going to sleep"
    cx.fillStyle = `rgba(0,0,0,${dim * 0.28})`;
    cx.fillRect(0, 0, PW, PH);
  }

  // 3. Force A-Frame to re-upload the canvas texture to the GPU this frame
  const mesh = document.getElementById('phone-screen').getObject3D('mesh');
  if (mesh && mesh.material && mesh.material.map) {
    mesh.material.map.needsUpdate = true;
  }
}
drawPhone(0);

// ─── Scene references ────────────────────────────────────────────────────────
const carEl      = document.getElementById('car');
const phonePivot = document.getElementById('phone-pivot');
const phoneScr   = document.getElementById('phone-screen');
const scrGlow    = document.getElementById('screen-glow');
const camEl      = document.getElementById('cam');

// DOM HUD
const hudEl   = document.getElementById('hud');
const leftBar = document.getElementById('left-bar');
const leftGlw = document.getElementById('left-glow');
const brTL    = document.getElementById('br-tl');
const brBL    = document.getElementById('br-bl');
const dangerV = document.getElementById('danger-vignette');

// Traffic light
const tlR     = document.getElementById('tl-red');
const tlA     = document.getElementById('tl-amber');
const tlG     = document.getElementById('tl-green');
const tlRGlow = document.getElementById('tl-red-glow');

// ─── Constants ───────────────────────────────────────────────────────────────
// Car travels along X: x=−120 → x=+18, fixed z=−7
// Player rig at (0,0,0), camera at (0,1.65,0).
// Distance from player to car ≈ sqrt(carX² + 49).
const CAR_X_START  = -120;
const CAR_X_END    =   18;
const PLAYER_Z     =    0;  // player rig z
const CAR_Z        =   -7;  // car travels at this z

const CUE_DIST     = 100;   // metres — cue first appears
const DIM_START_DIST = 100; // metres — phone starts blurring (same as cue)
const DIM_FULL_DIST  = 80;  // metres — full blur (fast ramp over 20 m window)
const SHAKE_DIST     =  7;  // metres — camera shake starts
const DURATION       =  9.5; // seconds for full pass

function lerp(a, b, t)    { return a + (b - a) * t; }
function clamp(v, lo, hi) { return v < lo ? lo : v > hi ? hi : v; }
function smooth(t)        { t = clamp(t, 0, 1); return t * t * (3 - 2 * t); }

function distToPlayer(carX) {
  const dx = carX - 0;       // player at x=0
  const dz = CAR_Z - PLAYER_Z; // = −7
  return Math.sqrt(dx * dx + dz * dz);
}

let animId = null, t0 = null, lastNow = null, pulseT = 0;

function applyState(carX, cueAlpha, dim, shake, dt) {
  // Car
  carEl.setAttribute('position', `${carX} 0 ${CAR_Z}`);

  // ── Phone blur / scale ──
  const s = lerp(1.0, 0.75, dim);
  phonePivot.setAttribute('scale', `${s} ${s} ${s}`);

  const emissI = lerp(0.35, 0.08, dim);
  phoneScr.setAttribute('material',
    `src:#phone-canvas; roughness:0.02; emissive:#1133bb; emissiveIntensity:${emissI}`);
  scrGlow.setAttribute('intensity', lerp(0.45, 0.08, dim));
  drawPhone(dim);

  // ── DOM HUD ──
  leftBar.style.opacity = cueAlpha;
  leftGlw.style.opacity = cueAlpha;
  brTL.style.opacity    = cueAlpha;
  brBL.style.opacity    = cueAlpha;

  // Pulse dom cue elements
  const pulsing = cueAlpha > 0.05;
  [leftBar, brTL, brBL].forEach(el => {
    pulsing ? el.classList.add('pulse') : el.classList.remove('pulse');
  });

  // Danger vignette when car < 12 m
  const dist = distToPlayer(carX);
  const vigA = smooth(clamp((12 - dist) / 10, 0, 1)) * 0.75;
  dangerV.style.opacity = vigA;

  // ── Camera shake ──
  if (shake > 0) {
    const sx = (Math.random() - 0.5) * 0.008 * shake;
    const sy = (Math.random() - 0.5) * 0.005 * shake;
    camEl.setAttribute('position', `0 ${1.65 + sy} ${sx}`);
  } else {
    camEl.setAttribute('position', '0 1.65 0');
  }
}

function resetAll() {
  applyState(CAR_X_START, 0, 0, 0, 0);
  pulseT = 0;
  dangerV.style.opacity = 0;
  vrCue.setAttribute('visible', false);
  camEl.setAttribute('position', '0 1.65 0');
  drawPhone(0);
  setLight('red');
}

function tick(now) {
  const dt = lastNow ? Math.min((now - lastNow) / 1000, 0.05) : 0;
  lastNow = now;
  if (!t0) t0 = now;

  const elapsed = (now - t0) / 1000;
  const prog    = clamp(elapsed / DURATION, 0, 1);

  // Linear car movement (constant city speed ≈ 48 km/h over 138 m in 9.5 s)
  const carX = lerp(CAR_X_START, CAR_X_END, prog);
  const dist = distToPlayer(carX);

  // ── Cue alpha: appears at 100 m, ramps to 1 by 60 m ──
  const cueAlpha = smooth(clamp((CUE_DIST - dist) / (CUE_DIST - 60), 0, 1));

  // ── Phone blur: starts at 40 m, full at 9 m, releases after car passes ──
  let dim = 0;
  const carPassed = carX > 4;
  if (!carPassed) {
    dim = smooth(clamp((DIM_START_DIST - dist) / (DIM_START_DIST - DIM_FULL_DIST), 0, 1));
  } else {
    // Quickly clear after car passes
    const clearT = clamp((carX - 4) / 6, 0, 1);
    dim = smooth(1 - clearT) * smooth(clamp((DIM_START_DIST - distToPlayer(4)) / (DIM_START_DIST - DIM_FULL_DIST), 0, 1));
  }

  // ── Camera shake: only when car is very close ──
  const shake = clamp((SHAKE_DIST - dist) / SHAKE_DIST, 0, 1) * (carPassed ? clamp(1 - (carX - 4) / 5, 0, 1) : 1);

  applyState(carX, cueAlpha, dim, shake, dt);

  // Traffic light
  if (elapsed > DURATION - 1.8) setLight('green');
  else if (elapsed > DURATION - 2.8) setLight('amber');
  else setLight('red');

  if (elapsed < DURATION + 1.2) {
    animId = requestAnimationFrame(tick);
  } else {
    lastNow = null; animId = null; t0 = null;
    resetAll();
    setTimeout(startScene, 3000);
  }
}

function startScene() {
  if (animId) cancelAnimationFrame(animId);
  lastNow = null; t0 = null; pulseT = 0;
  resetAll();
  animId = requestAnimationFrame(tick);
}

function setLight(phase) {
  const on  = c => `color:${c};emissive:${c};emissiveIntensity:1.5`;
  const off = c => `color:${c};emissiveIntensity:0`;
  tlR.setAttribute('material', phase === 'red'   ? on('#ff1500') : off('#1a0000'));
  tlA.setAttribute('material', phase === 'amber' ? on('#ff9900') : off('#1a0900'));
  tlG.setAttribute('material', phase === 'green' ? on('#00dd44') : off('#001a06'));
  tlRGlow.setAttribute('intensity', phase === 'red' ? '0.9' : '0');
}

document.querySelector('a-scene').addEventListener('loaded', () => {
  hudEl.style.display = 'block';
  resetAll();
  setTimeout(startScene, 2000);
});
document.querySelector('a-scene').addEventListener('enter-vr', () => {
  hudEl.style.display = 'block';
});
</script>
